# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be installed by adding
# `alembic[tz]` to the pip requirements
# timezone =

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; This defaults
# to app/alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator used is the : character (i.e. Windows: ".;.\versions")
# version_locations = %(here)s/bar:%(here)s/bat:app/alembic/versions

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = mysql+pymysql://root:password@localhost:3306/ca_firm_db


[post_write_hooks]
# post_write_hooks defines hooks or callables that are run on .py files as they are generated
# by the alembic command.  This can be used to format or lint the files
# (see also the upcoming 'black' example below)
# The format is: "key=module.path:callable" or just "key=module.path".
# If no callable is specified, the path is inserted directly into sys.path.
# The callable is passed a path to the new .py file.
# Examples:
#   console_scripts =
#   black =
#   ruff =
#   mypy =
#   format =
# format = black

# If using 'black' (or another hook that modifies the file in place),
# make sure to set "format" to a list of at least one item, so that
# the file is rewritten in place.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S